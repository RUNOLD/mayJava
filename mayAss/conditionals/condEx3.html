<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2b2b2b, #4a4a4a, #d9d9d9);
        }

        .container{
            width: 420px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow:
            0 8px 32px rgba(0,0,0,0.35),
            inset 0 1px 1px rgba(255,255,255,0.2);
        }

        h1{
            text-align: center;
            color: #f5f5f5;
            margin-bottom: 25px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .input-box{
            display: flex;
            gap: 12px;
        }

        #input{
            flex: 1;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: #ededed;
            color: #333;
            font-size: 16px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }

        button{
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #8d8d8d, #cfcfcf);
            color: #222;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow:
            4px 4px 10px rgba(0,0,0,0.25),
            inset 1px 1px 2px rgba(255,255,255,0.6);
        }

        button:hover{
            transform: translateY(-2px);
            background: linear-gradient(145deg, #bdbdbd, #efefef);
        }

        #result{
            margin-top: 25px;
            min-height: 60px;
            border-radius: 14px;
            padding: 18px;
            color: white;
            font-size: 20px;
            text-align: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Days of the Month checker</h1>

        <div class="input-box">
            <input id="input" type="text">
            <button onclick="showDays()">show days</button>
        </div>

        <div id="result"></div>

    </div>

</body>
<script>
    let input = document.getElementById('input')
    let result = document.getElementById('result')
    function showDays(params) {
        let inputValue = input.value.trim().toLowerCase()
        // console.log(inputValue);
        if (inputValue === '') {
            alert('no value input')
        } else if (inputValue === 'january') {
            // console.log('January has 31 days'); 
            result.innerHTML = 'January has 31 days.'
        } else if (inputValue === 'february') {
            result.innerHTML = 'February has 28 days.' 
        } else if (inputValue === 'march') {
            result.innerHTML = 'March has 31 days.' 
        } else if (inputValue === 'april') {
            result.innerHTML = 'April has 30 days.' 
        } else if (inputValue === 'May') {
            result.innerHTML = 'May has 31 days.' 
        } else if (inputValue === 'June') {
            result.innerHTML = 'June has 30 days.' 
        } else if (inputValue === 'July') {
            result.innerHTML = 'July has 31 days.' 
        } else if (inputValue === 'August') {
            result.innerHTML = 'August has 31 days.' 
        } else if (inputValue === 'September') {
            result.innerHTML = 'September has 31 days.' 
        } else if (inputValue === 'October') {
            result.innerHTML = 'October has 31 days.' 
        } else if (inputValue === 'November') {
            result.innerHTML = 'November has 31 days.' 
        } else if (inputValue === 'December') {
            result.innerHTML = 'December has 31 days.' 
        } else{
            alert('value is not a month')
            result.innerHTML = ''
        } 
    }
</script>

</html>
